spec_version: 1
name: crispr-editing-env
type: space
url: https://joywin2003-crispr-editing-env.hf.space
runtime: fastapi
app: server.app:app
port: 7860
description: >
  CRISPR gene editing environment where an AI agent uses bioinformatics tools
  to analyze DNA sequences, find PAM sites, design guide RNAs, evaluate off-target
  risks, and apply precision edits under resource constraints.
action_space:
  type: tool_commands
  tools:
    - analyze_sequence
    - search_pam_sites
    - design_guide
    - evaluate_guide
    - off_target_scan
    - apply_edit
    - check_edit_result
    - submit_solution
observation_space:
  task_description: string
  task_type: string
  target_gene_id: string
  target_gene_length: int
  known_mutations: list
  regulatory_regions: list
  experiment_budget: int
  steps_taken: int
  last_tool_output: string
  tool_history: list
  corrections_made: list
  off_target_damage: list
  available_tools: list
reward_type:
  type: continuous
  range: [0.0, 1.0]
  step_reward: small exploration signal
  final_score: task-specific grading
tasks:
  single_target:
    description: "Single-target knockout: correct one mutation with adequate budget"
    difficulty: easy
    grader_output: score_0_to_1
  multi_repair:
    description: "Multi-mutation repair: correct 3 mutations with strategic resource allocation"
    difficulty: medium
    grader_output: score_0_to_1
  precision_editing:
    description: "Precision editing: correct mutations while protecting a regulatory region"
    difficulty: hard
    grader_output: score_0_to_1
